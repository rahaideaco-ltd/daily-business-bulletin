name: Daily Business Bulletin Generator

on:
  schedule:
    # اجرا در ساعت 05:00 UTC (معادل 08:00 صبح به وقت ترکیه)
    - cron: '0 5 * * *'
  workflow_dispatch: # اجازه اجرای دستی را هم به شما می‌دهد

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "hojatdev@gmail.com"
          git add index.html decisions-log.json weekly-trends.md
          git commit -m "Auto-update daily bulletin and databases" || exit 0
          git push
