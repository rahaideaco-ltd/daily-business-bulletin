        }

            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

            color: var(--text-light);

            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
            white-space: nowrap;

            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            font-size: 0.85em;

            color: var(--soft-green);
        }

        .source-link a {
            color: var(--soft-blue);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .source-link a:hover {
            color: var(--accent-gold);
        }

            color: var(--accent-gold);
            font-size: 1.1em;
        }

            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9em;
            border-left: 4px solid var(--accent-gold);
        }

            color: var(--accent-gold);
            margin-top: 0;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .why-it-matters p, .action-for-startup p {
            margin-bottom: 0;
        }

            h1 {

                font-size: 1.8em;
            }
            .source-info {
                flex-direction: column;
                align-items: flex-end;
                gap: 10px;
            }
        }
    </style>

            "enterprise-ai": "هوش مصنوعی سازمانی",
            "hyper-personalization-ai": "فوق شخصی‌سازی با هوش مصنوعی",
            "new-revenue-streams": "جریان‌های درآمدی جدید",
            "saas-value-add": "ارزش افزوده SaaS",
            "operational-efficiency-ai": "بهره‌وری عملیاتی با هوش مصنوعی",
            "cost-cutting": "کاهش هزینه",
            "developer-platform": "پلتفرم توسعه‌دهندگان",
            "open-source-strategy": "استراتژی متن‌باز",
            "metaverse-infrastructure": "زیرساخت متاورس",
            "smb-tech-ai": "هوش مصنوعی برای کسب‌وکارهای کوچک و متوسط",
            "platform-optimization": "بهینه‌سازی پلتفرم",
            "data-privacy-ai": "حریم خصوصی داده با هوش مصنوعی",
            "multimodal-ai": "هوش مصنوعی چندوجهی",
            "edge-ai": "هوش مصنوعی لبه"
            /* Add more mappings as needed based on the general tags */
        };

        function getStarRating(quality) {
            return '⭐'.repeat(quality);
        }

        function createCard(signal) {
            const card = document.createElement('div');
            card.classList.add('card');

            card.innerHTML = `
                <div class="company-name">${signal.company}</div>
                <div class="category-tags">
                    ${signal.category.split(', ').map(cat => `<span class="category-tag" data-category="${cat.trim()}">${categoryMap[cat.trim()] || cat.trim()}</span>`).join('')}
                </div>
                <h2>مسئله</h2>
                <p>${signal.problem}</p>
                <h2>فرضیه</h2>
                <p>${signal.hypothesis}</p>
                <h2>اقدام/آزمایش</h2>
                <p>${signal.experiment_or_action}</p>
                <h2>متریک پیگیری شده</h2>
                <p>${signal.metric_tracked}</p>
                <h2>نتیجه تصمیم</h2>
                <p>${signal.decision_outcome}</p>
                <div class="why-it-matters">
                    <h3>چرا اهمیت دارد؟</h3>
                    <p>${signal.core_lesson}</p>
                </div>
                <div class="action-for-startup">
                    <h3>اقدام امروز برای استارتاپ شما:</h3>
                    <p>بر روی شناسایی نقاط اصطکاک با ارزش بالا در جریان‌های درآمدی یا عملیات مشتریان هدف خود تمرکز کنید. ببینید چگونه هوش مصنوعی می‌تواند به طور فعال این مشکلات را حل کرده و جریان‌های درآمدی جدید یا صرفه‌جویی در هزینه ایجاد کند. به استفاده از خدمات مدیریت شده ابری برای شتاب بخشیدن به توسعه و مقیاس‌پذیری راه‌حل‌های هوش مصنوعی خود فکر کنید، اما همواره حاکمیت داده و ملاحظات حریم خصوصی را در اولویت قرار دهید.</p>
                </div>
                <div class="source-info">
                    <span class="source-name">${signal.source_name}</span>
                    <span class="source-link"><a href="${signal.source_url}" target="_blank">مشاهده منبع</a></span>
                    <span class="stars">${getStarRating(signal.source_quality_stars)}</span>
                </div>
            `;
            return card;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('dashboard-container');
            signals.forEach(signal => {
                container.appendChild(createCard(signal));
            });
        });
    </script>
</body>
