            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.6em;
            color: var(--accent-color);
        }

        .card-header .date {
            font-size: 0.9em;
            color: #777;
        }

            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

            background-color: var(--border-color);
            color: var(--header-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            white-space: nowrap;
        }

        .tag.pricing { background-color: var(--category-pricing); color: white; }
        .tag.infrastructure { background-color: var(--category-infrastructure); color: white; }
        .tag.product-pivot { background-color: var(--category-product-pivot); color: white; }
        .tag.ai-integration { background-color: var(--category-ai-integration); color: white; }
        .tag.cost-cutting { background-color: var(--category-cost-cutting); color: white; }

        .card-section {
            margin-bottom: 20px;
        }

        .card-section h3 {
            font-size: 1.2em;
            color: var(--header-color);
            border-bottom: 1px dotted var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .card-section p {
            font-size: 0.95em;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .card-section ul {
            padding-right: 20px;
            margin-top: 0;
            margin-bottom: 8px;
            list-style-type: '— '; /* Custom bullet for lists */
        }

        .card-section li p {
            font-size: 0.9em;
            margin-bottom: 4px;
            color: #555;
            display: inline; /* Keep p tags inline with custom bullet */
        }

        .core-lesson {
            margin-top: auto; /* Pushes to the bottom */
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .core-lesson h3 {
            color: var(--accent-color);
            font-size: 1.3em;
            margin-bottom: 10px;
            border-bottom: none;
        }

        .core-lesson .action-heading {
            display: block;
            margin-top: 15px;
            color: var(--header-color);
            font-weight: 700;
            font-size: 1.1em;
        }

            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dotted var(--border-color);
            font-size: 0.85em;
            color: #777;
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* Align items to the bottom */

        .source-info a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .source-info a:hover {
            color: #FFD700; /* Gold on hover */
        }

        .stars {
            color: #FFD700; /* Gold */
            font-size: 1.1em;
        }

        .stars .empty {
            color: #CCC;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
                padding: 0 15px;
            }

                padding: 20px;

                font-size: 1.4em;
            }
            .source-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

                "core_lesson": "شناسایی یک مشکل سازمانی حیاتی، پیچیده و حل‌نشده (مانند انطباق ESG) و به‌کارگیری هوش مصنوعی تخصصی برای خودکارسازی و ساده‌سازی آن می‌تواند یک محصول SaaS قدرتمند و با ارزش بالا ایجاد کند، حتی برای یک استارتاپ نوپا.",
                "source_name": "TechCrunch, YC Startup Directory",
                "source_url": "https://techcrunch.com/2026/07/08/nexusai-ecotrace-a-raises-series-a-for-ai-powered-esg-compliance",
                "source_quality_stars": 4
            }
        ];

        function createStarRating(quality) {
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= quality) {
                    starsHtml += '&#9733;'; // Full star
                } else {
                    starsHtml += '<span class="empty">&#9734;</span>'; // Empty star
                }
            }
            return `<span class="stars">${starsHtml}</span>`;
        }

        function createTagPills(categoriesString) {
            const categories = categoriesString.split(',').map(tag => tag.trim());
            return categories.map(tag => `<span class="tag ${tag.replace(/-/g, ' ')}">${tag}</span>`).join('');
        }

        const gridContainer = document.getElementById('dashboard-grid');

        // Sort data by date in descending order (most recent first)
        allData.sort((a, b) => new Date(b.date) - new Date(a.date));

        allData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
                <div class="card-header">
                    <h2>${item.company}</h2>
                    <span class="date">${item.date}</span>
                </div>
                <div class="category-tags">
                    ${createTagPills(item.category)}
                </div>
                <div class="card-section">
                    <h3>مشکل:</h3>
                    <p>${item.problem}</p>
                </div>
                <div class="card-section">
                    <h3>فرضیه:</h3>
                    <p>${item.hypothesis}</p>
                </div>
                <div class="card-section">
                    <h3>اقدام/آزمایش:</h3>
                    <p>${item.experiment_or_action}</p>
                </div>
                <div class="card-section">
                    <h3>متریک:</h3>
                    <p>${item.metric_tracked}</p>
                </div>
                <div class="card-section">
                    <h3>نتیجه:</h3>
                    <p>${item.decision_outcome}</p>
                </div>
                <div class="core-lesson">
                    <h3>چرا اهمیت دارد؟ (درس‌آموخته)</h3>
                    <p>${item.core_lesson}</p>
                    <strong class="action-heading">اقدام امروز برای استارتاپ شما:</strong>
                    <ul>
                        <li><p>فراتر از بهینه‌سازی محصول، به دنبال راه‌هایی باشید که هوش مصنوعی می‌تواند فرآیندهای داخلی (مانند کاهش هزینه، مدیریت عرضه) را متحول کند.</p></li>
                        <li><p>بازارهای نیش سازمانی با مشکلات پیچیده و گران‌قیمت را که هوش مصنوعی تخصصی می‌تواند آن‌ها را حل کند، شناسایی کنید.</p></li>
                        <li><p>مدل‌های درآمدی خلاقانه (مانند اشتراک‌های پریمیوم، تقسیم درآمد، استقرارهای اختصاصی) برای قابلیت‌های هوش مصنوعی خود را کاوش کنید.</p></li>
                        <li><p>روی شفافیت داده و حریم خصوصی تمرکز کنید، به خصوص برای مشتریان سازمانی و حوزه‌های با مقررات بالا.</p></li>
                    </ul>
                </div>
                <div class="source-info">
                    <div>
                        <span>منبع: <a href="${item.source_url}" target="_blank">${item.source_name}</a></span>
                    </div>
                    ${createStarRating(item.source_quality_stars)}
                </div>
            `;
            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
