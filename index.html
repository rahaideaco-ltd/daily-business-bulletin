            flex-direction: column;

            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            color: var(--accent-gold);
            font-size: 1.8em;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);

            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--border-color);

            margin-bottom: 10px;
        }

        .category-tags {
            margin-top: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .category-tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;

        .tag-cloud-infrastructure-shifts, .tag-platform-optimization { background-color: var(--cat-infrastructure); }

            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);

        }

        function createStarRating(quality) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < quality) {
                    stars += '<i class="fas fa-star"></i>'; // Filled star
                } else {
                    stars += '<i class="far fa-star"></i>'; // Empty star (outline)
                }
            }
            return `<span class="star-rating">${stars}</span>`;
        }

        function getCategoryTagClass(category) {
            const normalizedCategory = category.toLowerCase().trim();
            if (normalizedCategory.includes('ai-') || normalizedCategory.includes('-ai') || normalizedCategory.includes('ai ')) {
                return 'tag-ai-integration'; // General AI category
            } else if (normalizedCategory.includes('pricing') || normalizedCategory.includes('revenue')) {
                return 'tag-pricing-revenue';
            } else if (normalizedCategory.includes('cloud-infrastructure') || normalizedCategory.includes('platform-optimization')) {
                return 'tag-infrastructure';
            } else if (normalizedCategory.includes('product-pivot')) {
                return 'tag-pivot';
            } else if (normalizedCategory.includes('cost-cutting')) {
                return 'tag-cost-cutting';
            } else if (normalizedCategory.includes('data-privacy')) {
                return 'tag-data-privacy';
            }
            return ''; // Default or unknown
        }

                <p><strong>تخصص‌گرایی عمیق AI:</strong> به جای ارائه AI عمومی، به فکر حل یک مشکل سازمانی خاص و با ارزش بالا باشید. <br/>
                <strong>مدل‌های قیمت‌گذاری مبتنی بر ارزش:</strong> برای راه‌حل‌های AI پریمیوم، مدل قیمت‌گذاری خود را بر اساس ارزش واقعی که برای مشتری ایجاد می‌کنید (مانند افزایش درآمد، کاهش هزینه) تنظیم کنید نه صرفاً بر اساس مصرف.<br/>
                <strong>بهینه‌سازی زیرساخت ابری:</strong> از خدمات مدیریت‌شده AI ارائه دهندگان ابری برای مقیاس‌پذیری و کاهش هزینه‌های عملیاتی استفاده کنید، مخصوصاً برای بارهای کاری سنگین AI.<br/>
                <strong>محرمانگی داده:</strong> برای مشتریان سازمانی، راهکارهای حفظ حریم خصوصی داده (مانند نمونه‌های خصوصی LLM یا پردازش روی لبه) را در اولویت قرار دهید.</p>
                <div class="source-info">
                    ${createStarRating(item.source_quality_stars)}
                    منبع: <a href="${item.source_url}" target="_blank">${item.source_name}</a>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
